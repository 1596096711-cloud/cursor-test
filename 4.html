<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑白声音星座 | 单色艺术装置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-color: #000;
            cursor: none;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #starfieldCanvas {
            z-index: 1;
        }
        
        #constellationCanvas {
            z-index: 2;
        }
        
        #particleCanvas {
            z-index: 3;
        }
        
        #feedbackCanvas {
            z-index: 4;
        }
        
        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="starfieldCanvas"></canvas>
    <canvas id="constellationCanvas"></canvas>
    <canvas id="particleCanvas"></canvas>
    <canvas id="feedbackCanvas"></canvas>

    <script>
        // 获取Canvas元素和上下文
        const starfieldCanvas = document.getElementById('starfieldCanvas');
        const constellationCanvas = document.getElementById('constellationCanvas');
        const particleCanvas = document.getElementById('particleCanvas');
        const feedbackCanvas = document.getElementById('feedbackCanvas');
        
        const starfieldCtx = starfieldCanvas.getContext('2d');
        const constellationCtx = constellationCanvas.getContext('2d');
        const particleCtx = particleCanvas.getContext('2d');
        const feedbackCtx = feedbackCanvas.getContext('2d');
        
        // 初始化变量
        let audioContext;
        let analyser;
        let microphone;
        let audioDataArray;
        let isRecording = false;
        let constellations = [];
        let stars = [];
        let particles = [];
        let feedbackParticles = [];
        let animationId;
        let lastSoundTime = 0;
        let currentConstellation = [];
        let constellationId = 0;
        let soundLevel = 0;
        let silenceTimer = 0;
        let autoClearTimeout;
        let soundWavePoints = [];
        let soundWaveAngle = 0;
        
        // 黑白灰度值数组 (0-255)
        const grayscaleValues = [
            255, // 纯白
            240,
            225,
            210,
            195,
            180,
            165,
            150,
            135,
            120,
            105,
            90,
            75,
            60,
            45,
            30,
            15,
            0   // 纯黑
        ];
        
        // 初始化Canvas尺寸
        function initCanvasSize() {
            starfieldCanvas.width = window.innerWidth;
            starfieldCanvas.height = window.innerHeight;
            constellationCanvas.width = window.innerWidth;
            constellationCanvas.height = window.innerHeight;
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
            feedbackCanvas.width = window.innerWidth;
            feedbackCanvas.height = window.innerHeight;
        }
        
        // 创建背景星空
        function createStarfield() {
            stars = [];
            const starCount = Math.floor((starfieldCanvas.width * starfieldCanvas.height) / 1000);
            
            for (let i = 0; i < starCount; i++) {
                const brightness = Math.random();
                const grayValue = Math.floor(brightness * 255);
                const size = Math.random() * 2.2 + 0.3;
                
                stars.push({
                    x: Math.random() * starfieldCanvas.width,
                    y: Math.random() * starfieldCanvas.height,
                    size: size,
                    originalSize: size,
                    brightness: brightness,
                    originalBrightness: brightness,
                    speed: Math.random() * 0.015 + 0.005,
                    pulseDirection: Math.random() > 0.5 ? 1 : -1,
                    twinkleSpeed: Math.random() * 0.01 + 0.005,
                    grayValue: grayValue
                });
            }
        }
        
        // 绘制背景星空
        function drawStarfield() {
            // 纯黑背景
            starfieldCtx.fillStyle = '#000000';
            starfieldCtx.fillRect(0, 0, starfieldCanvas.width, starfieldCanvas.height);
            
            // 绘制银河效果（黑白版本）
            drawMonochromeGalaxy();
            
            // 绘制星星
            stars.forEach(star => {
                // 根据声音级别影响星星
                if (soundLevel > 30) {
                    star.size = star.originalSize * (1 + soundLevel / 400);
                    star.brightness = Math.min(1, star.originalBrightness * (1 + soundLevel / 300));
                } else {
                    // 正常的闪烁效果
                    star.brightness += star.twinkleSpeed * star.pulseDirection;
                    if (star.brightness > star.originalBrightness * 1.4 || star.brightness < star.originalBrightness * 0.6) {
                        star.pulseDirection *= -1;
                    }
                    star.size = star.originalSize;
                }
                
                // 计算灰度值
                const gray = Math.floor(star.brightness * 255);
                
                // 绘制星星
                starfieldCtx.beginPath();
                starfieldCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                starfieldCtx.fillStyle = `rgba(${gray}, ${gray}, ${gray}, 1)`;
                starfieldCtx.fill();
                
                // 偶尔绘制星光闪烁
                if (Math.random() < 0.0008 * (soundLevel / 50 + 1)) {
                    const flareSize = star.size * (5 + soundLevel / 60);
                    const flareGradient = starfieldCtx.createRadialGradient(
                        star.x, star.y, 0,
                        star.x, star.y, flareSize
                    );
                    flareGradient.addColorStop(0, `rgba(${gray}, ${gray}, ${gray}, ${star.brightness * 0.6})`);
                    flareGradient.addColorStop(1, `rgba(${gray}, ${gray}, ${gray}, 0)`);
                    
                    starfieldCtx.beginPath();
                    starfieldCtx.arc(star.x, star.y, flareSize, 0, Math.PI * 2);
                    starfieldCtx.fillStyle = flareGradient;
                    starfieldCtx.fill();
                }
            });
        }
        
        // 绘制黑白银河
        function drawMonochromeGalaxy() {
            const time = Date.now() / 15000;
            const centerX = starfieldCanvas.width / 2;
            const centerY = starfieldCanvas.height / 2;
            
            // 绘制银河核心
            const coreGradient = starfieldCtx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 200
            );
            coreGradient.addColorStop(0, 'rgba(150, 150, 150, 0.15)');
            coreGradient.addColorStop(0.5, 'rgba(80, 80, 80, 0.05)');
            coreGradient.addColorStop(1, 'rgba(20, 20, 20, 0)');
            
            starfieldCtx.beginPath();
            starfieldCtx.arc(centerX, centerY, 200, 0, Math.PI * 2);
            starfieldCtx.fillStyle = coreGradient;
            starfieldCtx.fill();
            
            // 绘制银河旋臂
            for (let arm = 0; arm < 4; arm++) {
                const armAngle = (arm * Math.PI / 2) + time;
                
                for (let i = 0; i < 150; i++) {
                    const angle = armAngle + (i / 40);
                    const distance = 200 + (i / 1.5);
                    const x = centerX + Math.cos(angle) * distance;
                    const y = centerY + Math.sin(angle) * distance;
                    const alpha = 0.08 * (1 - i / 150);
                    const grayValue = 100 + Math.sin(i / 10) * 30;
                    
                    starfieldCtx.beginPath();
                    starfieldCtx.arc(x, y, 0.8, 0, Math.PI * 2);
                    starfieldCtx.fillStyle = `rgba(${grayValue}, ${grayValue}, ${grayValue}, ${alpha})`;
                    starfieldCtx.fill();
                }
            }
        }
        
        // 绘制声音波形
        function drawSoundWave() {
            if (soundLevel < 10) return;
            
            const centerX = constellationCanvas.width / 2;
            const centerY = constellationCanvas.height / 2;
            const waveRadius = 100 + soundLevel;
            const points = 128;
            
            soundWaveAngle += 0.02;
            
            // 清空之前的点，只保留最近的一些
            if (soundWavePoints.length > 100) {
                soundWavePoints = soundWavePoints.slice(-80);
            }
            
            // 添加新点
            for (let i = 0; i < points; i++) {
                const angle = soundWaveAngle + (i / points) * Math.PI * 2;
                const radius = waveRadius + Math.sin(angle * 5) * (soundLevel / 10);
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                
                soundWavePoints.push({
                    x, y,
                    alpha: 1,
                    size: 1 + soundLevel / 100
                });
            }
            
            // 绘制波形
            if (soundWavePoints.length > 3) {
                constellationCtx.beginPath();
                constellationCtx.moveTo(soundWavePoints[0].x, soundWavePoints[0].y);
                
                for (let i = 1; i < soundWavePoints.length; i++) {
                    const point = soundWavePoints[i];
                    constellationCtx.lineTo(point.x, point.y);
                    
                    // 更新透明度
                    point.alpha -= 0.005;
                    point.size *= 0.995;
                }
                
                constellationCtx.strokeStyle = `rgba(255, 255, 255, ${Math.min(0.7, soundLevel / 200)})`;
                constellationCtx.lineWidth = 1.2;
                constellationCtx.stroke();
            }
            
            // 移除透明度太低的点
            soundWavePoints = soundWavePoints.filter(p => p.alpha > 0.05);
        }
        
        // 创建粒子系统
        function createParticles(count, x, y, grayValue) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2.5 + 0.5;
                const size = Math.random() * 1.8 + 0.3;
                const gray = grayValue || Math.floor(Math.random() * 256);
                
                particles.push({
                    x: x || Math.random() * particleCanvas.width,
                    y: y || Math.random() * particleCanvas.height,
                    size: size,
                    originalSize: size,
                    speedX: Math.cos(angle) * speed,
                    speedY: Math.sin(angle) * speed,
                    gray: gray,
                    life: 1,
                    decay: Math.random() * 0.015 + 0.005,
                    type: 'normal'
                });
            }
        }
        
        // 创建反馈粒子
        function createFeedbackParticles(x, y, volume) {
            const particleCount = Math.floor(volume / 15);
            const grayValue = Math.min(255, 150 + volume / 2);
            
            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 1;
                const size = Math.random() * 2.5 + 0.5;
                
                feedbackParticles.push({
                    x: x,
                    y: y,
                    size: size,
                    speedX: Math.cos(angle) * speed,
                    speedY: Math.sin(angle) * speed,
                    gray: grayValue,
                    life: 1,
                    decay: Math.random() * 0.025 + 0.01,
                    type: 'feedback'
                });
            }
        }
        
        // 绘制粒子
        function drawParticles() {
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            
            // 更新和绘制普通粒子
            particles.forEach((particle, index) => {
                // 更新粒子位置
                particle.x += particle.speedX;
                particle.y += particle.speedY;
                
                // 更新粒子生命值
                particle.life -= particle.decay;
                
                // 移除死亡的粒子
                if (particle.life <= 0) {
                    particles.splice(index, 1);
                    return;
                }
                
                // 绘制粒子
                particleCtx.beginPath();
                particleCtx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                particleCtx.fillStyle = `rgba(${particle.gray}, ${particle.gray}, ${particle.gray}, ${particle.life * 0.6})`;
                particleCtx.fill();
                
                // 添加光晕效果
                const glowRadius = particle.size * 3;
                const gradient = particleCtx.createRadialGradient(
                    particle.x, particle.y, 0,
                    particle.x, particle.y, glowRadius
                );
                gradient.addColorStop(0, `rgba(${particle.gray}, ${particle.gray}, ${particle.gray}, ${particle.life * 0.2})`);
                gradient.addColorStop(1, `rgba(${particle.gray}, ${particle.gray}, ${particle.gray}, 0)`);
                
                particleCtx.beginPath();
                particleCtx.arc(particle.x, particle.y, glowRadius, 0, Math.PI * 2);
                particleCtx.fillStyle = gradient;
                particleCtx.fill();
            });
            
            // 如果粒子太少，补充一些
            if (particles.length < 25) {
                createParticles(5);
            }
        }
        
        // 绘制反馈粒子
        function drawFeedbackParticles() {
            feedbackCtx.clearRect(0, 0, feedbackCanvas.width, feedbackCanvas.height);
            
            // 更新和绘制反馈粒子
            feedbackParticles.forEach((particle, index) => {
                // 更新粒子位置
                particle.x += particle.speedX;
                particle.y += particle.speedY;
                
                // 更新粒子生命值
                particle.life -= particle.decay;
                
                // 移除死亡的粒子
                if (particle.life <= 0) {
                    feedbackParticles.splice(index, 1);
                    return;
                }
                
                // 绘制粒子
                feedbackCtx.beginPath();
                feedbackCtx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                feedbackCtx.fillStyle = `rgba(${particle.gray}, ${particle.gray}, ${particle.gray}, ${particle.life})`;
                feedbackCtx.fill();
                
                // 添加光晕效果
                const glowRadius = particle.size * 4;
                const gradient = feedbackCtx.createRadialGradient(
                    particle.x, particle.y, 0,
                    particle.x, particle.y, glowRadius
                );
                gradient.addColorStop(0, `rgba(${particle.gray}, ${particle.gray}, ${particle.gray}, ${particle.life * 0.5})`);
                gradient.addColorStop(1, `rgba(${particle.gray}, ${particle.gray}, ${particle.gray}, 0)`);
                
                feedbackCtx.beginPath();
                feedbackCtx.arc(particle.x, particle.y, glowRadius, 0, Math.PI * 2);
                feedbackCtx.fillStyle = gradient;
                feedbackCtx.fill();
            });
        }
        
        // 绘制星座
        function drawConstellations() {
            // 清除画布，使用轻微黑色覆盖创造淡出效果
            constellationCtx.fillStyle = 'rgba(0, 0, 0, 0.02)';
            constellationCtx.fillRect(0, 0, constellationCanvas.width, constellationCanvas.height);
            
            // 绘制声音波形
            drawSoundWave();
            
            // 绘制所有星座
            constellations.forEach((constellation, index) => {
                // 更新星座点透明度（逐渐消失）
                constellation.points.forEach(point => {
                    point.alpha -= 0.001;
                    point.alpha = Math.max(0, point.alpha);
                });
                
                // 移除完全消失的星座
                if (constellation.points[0].alpha <= 0) {
                    constellations.splice(index, 1);
                    return;
                }
                
                // 绘制星座点
                constellation.points.forEach(point => {
                    // 绘制光晕
                    const glowRadius = point.size * 4;
                    const gradient = constellationCtx.createRadialGradient(
                        point.x, point.y, 0,
                        point.x, point.y, glowRadius
                    );
                    gradient.addColorStop(0, `rgba(${point.gray}, ${point.gray}, ${point.gray}, ${point.alpha * 0.6})`);
                    gradient.addColorStop(1, `rgba(${point.gray}, ${point.gray}, ${point.gray}, 0)`);
                    
                    constellationCtx.beginPath();
                    constellationCtx.arc(point.x, point.y, glowRadius, 0, Math.PI * 2);
                    constellationCtx.fillStyle = gradient;
                    constellationCtx.fill();
                    
                    // 绘制中心点
                    constellationCtx.beginPath();
                    constellationCtx.arc(point.x, point.y, point.size, 0, Math.PI * 2);
                    constellationCtx.fillStyle = `rgba(${point.gray}, ${point.gray}, ${point.gray}, ${point.alpha})`;
                    constellationCtx.fill();
                });
                
                // 绘制星座连线
                constellationCtx.lineWidth = 1.2;
                constellation.lines.forEach(line => {
                    const pointA = constellation.points[line[0]];
                    const pointB = constellation.points[line[1]];
                    
                    if (pointA.alpha > 0 && pointB.alpha > 0) {
                        // 创建连线渐变
                        const lineGradient = constellationCtx.createLinearGradient(
                            pointA.x, pointA.y,
                            pointB.x, pointB.y
                        );
                        lineGradient.addColorStop(0, `rgba(${pointA.gray}, ${pointA.gray}, ${pointA.gray}, ${pointA.alpha * 0.5})`);
                        lineGradient.addColorStop(1, `rgba(${pointB.gray}, ${pointB.gray}, ${pointB.gray}, ${pointB.alpha * 0.5})`);
                        
                        constellationCtx.beginPath();
                        constellationCtx.moveTo(pointA.x, pointA.y);
                        constellationCtx.lineTo(pointB.x, pointB.y);
                        constellationCtx.strokeStyle = lineGradient;
                        constellationCtx.stroke();
                        
                        // 绘制连线上的流光效果（白色）
                        const time = Date.now() / 1000;
                        const flowPos = (time % 4) / 4;
                        
                        if (flowPos > 0 && flowPos < 0.9) {
                            const flowX = pointA.x + (pointB.x - pointA.x) * flowPos;
                            const flowY = pointA.y + (pointB.y - pointA.y) * flowPos;
                            
                            constellationCtx.beginPath();
                            constellationCtx.arc(flowX, flowY, 1.5, 0, Math.PI * 2);
                            constellationCtx.fillStyle = `rgba(255, 255, 255, ${pointA.alpha * 0.8})`;
                            constellationCtx.fill();
                        }
                    }
                });
            });
            
            // 绘制当前正在生成的星座（如果存在）
            if (currentConstellation.length > 0) {
                // 绘制当前星座点
                currentConstellation.forEach(point => {
                    const currentAlpha = Math.min(1, point.alpha + 0.3);
                    
                    // 绘制光晕
                    const glowRadius = point.size * 5;
                    const gradient = constellationCtx.createRadialGradient(
                        point.x, point.y, 0,
                        point.x, point.y, glowRadius
                    );
                    gradient.addColorStop(0, `rgba(${point.gray}, ${point.gray}, ${point.gray}, ${currentAlpha * 0.7})`);
                    gradient.addColorStop(1, `rgba(${point.gray}, ${point.gray}, ${point.gray}, 0)`);
                    
                    constellationCtx.beginPath();
                    constellationCtx.arc(point.x, point.y, glowRadius, 0, Math.PI * 2);
                    constellationCtx.fillStyle = gradient;
                    constellationCtx.fill();
                    
                    // 绘制中心点
                    constellationCtx.beginPath();
                    constellationCtx.arc(point.x, point.y, point.size, 0, Math.PI * 2);
                    constellationCtx.fillStyle = `rgba(${point.gray}, ${point.gray}, ${point.gray}, ${currentAlpha})`;
                    constellationCtx.fill();
                });
                
                // 绘制当前星座连线
                if (currentConstellation.length > 1) {
                    constellationCtx.lineWidth = 1.8;
                    constellationCtx.beginPath();
                    constellationCtx.moveTo(currentConstellation[0].x, currentConstellation[0].y);
                    
                    for (let i = 1; i < currentConstellation.length; i++) {
                        constellationCtx.lineTo(currentConstellation[i].x, currentConstellation[i].y);
                    }
                    
                    constellationCtx.strokeStyle = `rgba(255, 255, 255, 0.9)`;
                    constellationCtx.stroke();
                }
            }
        }
        
        // 分析音频数据
        function analyzeAudio() {
            if (!isRecording || !analyser) return;
            
            // 获取音频数据
            analyser.getByteFrequencyData(audioDataArray);
            
            // 计算平均音量
            let sum = 0;
            for (let i = 0; i < audioDataArray.length; i++) {
                sum += audioDataArray[i];
            }
            const averageVolume = sum / audioDataArray.length;
            
            // 更新音量值
            soundLevel = averageVolume;
            
            // 计算主要频率
            let maxFreqIndex = 0;
            let maxFreqValue = 0;
            for (let i = 0; i < audioDataArray.length / 2; i++) {
                if (audioDataArray[i] > maxFreqValue) {
                    maxFreqValue = audioDataArray[i];
                    maxFreqIndex = i;
                }
            }
            const dominantFrequency = maxFreqIndex;
            
            // 检查是否超过音量阈值
            if (averageVolume > 20) {
                const now = Date.now();
                silenceTimer = 0;
                
                // 根据灵敏度控制生成频率
                const sensitivity = Math.max(3, Math.min(10, averageVolume / 15));
                if (now - lastSoundTime > 1000 / sensitivity) {
                    lastSoundTime = now;
                    
                    // 生成星座点
                    const pointSize = Math.max(1.5, Math.min(9, averageVolume / 25));
                    
                    // 根据频率确定灰度值
                    const grayValue = Math.floor((dominantFrequency / 256) * 200 + 55);
                    
                    // 根据频率确定位置
                    const xPos = (dominantFrequency / 256) * constellationCanvas.width;
                    const yPos = Math.sin(now / 800) * 100 + (constellationCanvas.height / 2) + (Math.random() - 0.5) * 150;
                    
                    // 创建新点
                    const newPoint = {
                        x: xPos,
                        y: yPos,
                        size: pointSize,
                        gray: grayValue,
                        alpha: 1.0,
                        createdAt: now
                    };
                    
                    // 添加到当前星座
                    currentConstellation.push(newPoint);
                    
                    // 创建粒子效果
                    createParticles(Math.floor(pointSize / 2), xPos, yPos, grayValue);
                    
                    // 创建反馈粒子
                    createFeedbackParticles(xPos, yPos, averageVolume);
                    
                    // 如果当前星座有足够多的点，则完成这个星座
                    const maxPoints = Math.floor(averageVolume / 30) + 1;
                    if (currentConstellation.length >= maxPoints) {
                        completeConstellation();
                    }
                    
                    // 重置自动清除计时器
                    resetAutoClearTimer();
                }
            } else {
                // 增加静音计时器
                silenceTimer += 1;
                
                // 如果静音时间较长，完成当前星座
                if (silenceTimer > 30 && currentConstellation.length > 0) {
                    completeConstellation();
                }
            }
        }
        
        // 完成当前星座
        function completeConstellation() {
            if (currentConstellation.length === 0) return;
            
            // 生成连线（最小生成树简化版）
            const lines = generateMST(currentConstellation);
            
            // 将当前星座添加到星座列表
            constellations.push({
                id: constellationId++,
                points: [...currentConstellation],
                lines: lines
            });
            
            // 创建庆祝粒子
            const centerX = currentConstellation.reduce((sum, p) => sum + p.x, 0) / currentConstellation.length;
            const centerY = currentConstellation.reduce((sum, p) => sum + p.y, 0) / currentConstellation.length;
            createParticles(25, centerX, centerY, 255);
            
            // 重置当前星座
            currentConstellation = [];
        }
        
        // 生成最小生成树连线
        function generateMST(points) {
            const lines = [];
            if (points.length <= 1) return lines;
            
            // 简单实现：连接相邻点，并添加一些随机连接
            for (let i = 0; i < points.length - 1; i++) {
                lines.push([i, i + 1]);
            }
            
            // 添加一些对角线连接
            const extraConnections = Math.floor(points.length / 3);
            for (let i = 0; i < extraConnections; i++) {
                const a = Math.floor(Math.random() * points.length);
                const b = Math.floor(Math.random() * points.length);
                if (a !== b && Math.abs(a - b) > 1) {
                    lines.push([a, b]);
                }
            }
            
            return lines;
        }
        
        // 重置自动清除计时器
        function resetAutoClearTimer() {
            clearTimeout(autoClearTimeout);
            // 如果120秒没有声音，自动清除所有星座
            autoClearTimeout = setTimeout(() => {
                if (soundLevel < 10) {
                    constellations = [];
                    constellationId = 0;
                    createParticles(40, 
                        constellationCanvas.width / 2, 
                        constellationCanvas.height / 2, 
                        255
                    );
                }
            }, 120000);
        }
        
        // 动画循环
        function animate() {
            drawStarfield();
            drawConstellations();
            drawParticles();
            drawFeedbackParticles();
            analyzeAudio();
            animationId = requestAnimationFrame(animate);
        }
        
        // 初始化音频
        async function initAudio() {
            try {
                // 请求麦克风权限
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                
                // 创建音频上下文
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                // 连接音频节点
                microphone.connect(analyser);
                analyser.fftSize = 512;
                analyser.smoothingTimeConstant = 0.7;
                
                // 创建数据数组
                const bufferLength = analyser.frequencyBinCount;
                audioDataArray = new Uint8Array(bufferLength);
                
                // 更新状态
                isRecording = true;
                
                // 创建初始粒子
                createParticles(40);
                
            } catch (error) {
                console.log('麦克风不可用，使用模拟声音模式');
                
                // 如果无法访问麦克风，使用模拟声音数据
                simulateAudio();
            }
        }
        
        // 模拟音频数据
        function simulateAudio() {
            isRecording = true;
            audioDataArray = new Uint8Array(256);
            
            // 创建周期性模拟声音
            let soundPhase = 0;
            
            setInterval(() => {
                // 生成有节奏的声音模式
                soundPhase += 0.08;
                const baseVolume = 25 + Math.sin(soundPhase) * 15;
                
                for (let i = 0; i < audioDataArray.length; i++) {
                    const frequencyPattern = Math.sin(i / 15 + soundPhase * 2) * 0.5 + 0.5;
                    audioDataArray[i] = baseVolume * frequencyPattern + Math.random() * 8;
                }
                
                // 偶尔生成较大的声音事件
                if (Math.random() < 0.08) {
                    for (let i = 0; i < audioDataArray.length; i++) {
                        audioDataArray[i] = Math.min(255, audioDataArray[i] * 1.8);
                    }
                }
            }, 100);
            
            // 创建初始粒子
            createParticles(40);
        }
        
        // 处理窗口点击（开始音频上下文）
        function handleUserInteraction() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            // 创建视觉反馈
            createFeedbackParticles(
                Math.random() * feedbackCanvas.width,
                Math.random() * feedbackCanvas.height,
                100
            );
        }
        
        // 初始化
        function init() {
            initCanvasSize();
            createStarfield();
            
            // 添加用户交互监听
            window.addEventListener('click', handleUserInteraction);
            window.addEventListener('touchstart', handleUserInteraction);
            window.addEventListener('keydown', handleUserInteraction);
            
            // 窗口大小变化时调整Canvas尺寸
            window.addEventListener('resize', function() {
                initCanvasSize();
                createStarfield();
            });
            
            // 开始动画
            animate();
            
            // 尝试初始化音频
            initAudio();
        }
        
        // 启动应用
        init();
    </script>
</body>
</html>
