<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>声音星座 | 沉浸式艺术装置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-color: #000;
            cursor: none;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        #starfieldCanvas {
            z-index: 1;
        }
        
        #constellationCanvas {
            z-index: 2;
        }
        
        #particleCanvas {
            z-index: 3;
        }
        
        #feedbackCanvas {
            z-index: 4;
        }
        
        /* 隐藏滚动条 */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="starfieldCanvas"></canvas>
    <canvas id="constellationCanvas"></canvas>
    <canvas id="particleCanvas"></canvas>
    <canvas id="feedbackCanvas"></canvas>

    <script>
        // 获取Canvas元素和上下文
        const starfieldCanvas = document.getElementById('starfieldCanvas');
        const constellationCanvas = document.getElementById('constellationCanvas');
        const particleCanvas = document.getElementById('particleCanvas');
        const feedbackCanvas = document.getElementById('feedbackCanvas');
        
        const starfieldCtx = starfieldCanvas.getContext('2d');
        const constellationCtx = constellationCanvas.getContext('2d');
        const particleCtx = particleCanvas.getContext('2d');
        const feedbackCtx = feedbackCanvas.getContext('2d');
        
        // 初始化变量
        let audioContext;
        let analyser;
        let microphone;
        let audioDataArray;
        let isRecording = false;
        let constellations = [];
        let stars = [];
        let particles = [];
        let feedbackParticles = [];
        let animationId;
        let lastSoundTime = 0;
        let currentConstellation = [];
        let constellationId = 0;
        let soundLevel = 0;
        let silenceTimer = 0;
        let autoClearTimeout;
        
        // 颜色调色板
        const colorPalettes = [
            // 紫色调色板
            ['138, 43, 226', '148, 0, 211', '153, 50, 204', '186, 85, 211'],
            // 蓝色调色板
            ['0, 191, 255', '30, 144, 255', '65, 105, 225', '70, 130, 180'],
            // 青色调色板
            ['0, 255, 255', '64, 224, 208', '72, 209, 204', '32, 178, 170'],
            // 粉色调色板
            ['255, 105, 180', '219, 112, 147', '199, 21, 133', '255, 20, 147']
        ];
        
        let currentPalette = 0;
        
        // 星座形状数据库
        const constellationPatterns = [
            // 线条模式
            (points) => {
                const lines = [];
                for (let i = 0; i < points.length - 1; i++) {
                    lines.push([i, i + 1]);
                }
                return lines;
            },
            // 三角形模式
            (points) => {
                const lines = [];
                if (points.length >= 3) {
                    lines.push([0, 1], [1, 2], [2, 0]);
                    for (let i = 3; i < points.length; i++) {
                        lines.push([i, i % 3]);
                    }
                }
                return lines;
            },
            // 星形模式
            (points) => {
                const lines = [];
                if (points.length >= 5) {
                    lines.push([0, 2], [2, 4], [4, 1], [1, 3], [3, 0]);
                }
                return lines;
            },
            // 网状模式
            (points) => {
                const lines = [];
                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        if (Math.random() > 0.7) {
                            lines.push([i, j]);
                        }
                    }
                }
                return lines;
            }
        ];
        
        // 初始化Canvas尺寸
        function initCanvasSize() {
            starfieldCanvas.width = window.innerWidth;
            starfieldCanvas.height = window.innerHeight;
            constellationCanvas.width = window.innerWidth;
            constellationCanvas.height = window.innerHeight;
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
            feedbackCanvas.width = window.innerWidth;
            feedbackCanvas.height = window.innerHeight;
        }
        
        // 创建背景星空
        function createStarfield() {
            stars = [];
            const starCount = Math.floor((starfieldCanvas.width * starfieldCanvas.height) / 1200);
            
            for (let i = 0; i < starCount; i++) {
                const size = Math.random() * 2.5 + 0.5;
                const brightness = Math.random() * 0.8 + 0.2;
                
                stars.push({
                    x: Math.random() * starfieldCanvas.width,
                    y: Math.random() * starfieldCanvas.height,
                    size: size,
                    originalSize: size,
                    brightness: brightness,
                    originalBrightness: brightness,
                    speed: Math.random() * 0.02 + 0.005,
                    pulseDirection: Math.random() > 0.5 ? 1 : -1,
                    twinkleSpeed: Math.random() * 0.015 + 0.005,
                    color: `rgba(255, 255, 255, ${brightness})`
                });
            }
        }
        
        // 绘制背景星空
        function drawStarfield() {
            // 创建深空渐变背景
            const gradient = starfieldCtx.createRadialGradient(
                starfieldCanvas.width / 2, starfieldCanvas.height / 2, 0,
                starfieldCanvas.width / 2, starfieldCanvas.height / 2, starfieldCanvas.width * 0.8
            );
            gradient.addColorStop(0, '#000814');
            gradient.addColorStop(0.5, '#001233');
            gradient.addColorStop(1, '#000510');
            
            starfieldCtx.fillStyle = gradient;
            starfieldCtx.fillRect(0, 0, starfieldCanvas.width, starfieldCanvas.height);
            
            // 绘制银河效果
            drawGalaxy();
            
            // 绘制星星
            stars.forEach(star => {
                // 根据声音级别影响星星
                if (soundLevel > 30) {
                    star.size = star.originalSize * (1 + soundLevel / 300);
                    star.brightness = Math.min(1, star.originalBrightness * (1 + soundLevel / 200));
                } else {
                    // 正常的闪烁效果
                    star.brightness += star.twinkleSpeed * star.pulseDirection;
                    if (star.brightness > star.originalBrightness * 1.3 || star.brightness < star.originalBrightness * 0.7) {
                        star.pulseDirection *= -1;
                    }
                    star.size = star.originalSize;
                }
                
                // 绘制星星
                starfieldCtx.beginPath();
                starfieldCtx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                starfieldCtx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                starfieldCtx.fill();
                
                // 偶尔绘制星光闪烁
                if (Math.random() < 0.001 * (soundLevel / 50 + 1)) {
                    const flareSize = star.size * (4 + soundLevel / 50);
                    const flareGradient = starfieldCtx.createRadialGradient(
                        star.x, star.y, 0,
                        star.x, star.y, flareSize
                    );
                    flareGradient.addColorStop(0, `rgba(255, 255, 255, ${star.brightness * 0.8})`);
                    flareGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    
                    starfieldCtx.beginPath();
                    starfieldCtx.arc(star.x, star.y, flareSize, 0, Math.PI * 2);
                    starfieldCtx.fillStyle = flareGradient;
                    starfieldCtx.fill();
                }
            });
        }
        
        // 绘制银河效果
        function drawGalaxy() {
            const time = Date.now() / 10000;
            const centerX = starfieldCanvas.width / 2;
            const centerY = starfieldCanvas.height / 2;
            
            // 绘制银河核心
            const coreGradient = starfieldCtx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 150
            );
            coreGradient.addColorStop(0, 'rgba(100, 100, 150, 0.3)');
            coreGradient.addColorStop(1, 'rgba(50, 50, 100, 0)');
            
            starfieldCtx.beginPath();
            starfieldCtx.arc(centerX, centerY, 150, 0, Math.PI * 2);
            starfieldCtx.fillStyle = coreGradient;
            starfieldCtx.fill();
            
            // 绘制银河旋臂
            for (let arm = 0; arm < 4; arm++) {
                const armAngle = (arm * Math.PI / 2) + time;
                
                for (let i = 0; i < 200; i++) {
                    const angle = armAngle + (i / 50);
                    const distance = 150 + (i / 2);
                    const x = centerX + Math.cos(angle) * distance;
                    const y = centerY + Math.sin(angle) * distance;
                    const alpha = 0.1 * (1 - i / 200);
                    
                    starfieldCtx.beginPath();
                    starfieldCtx.arc(x, y, 1, 0, Math.PI * 2);
                    starfieldCtx.fillStyle = `rgba(150, 150, 200, ${alpha})`;
                    starfieldCtx.fill();
                }
            }
        }
        
        // 创建粒子系统
        function createParticles(count, x, y, color) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                const size = Math.random() * 2 + 0.5;
                
                particles.push({
                    x: x || Math.random() * particleCanvas.width,
                    y: y || Math.random() * particleCanvas.height,
                    size: size,
                    originalSize: size,
                    speedX: Math.cos(angle) * speed,
                    speedY: Math.sin(angle) * speed,
                    color: color || colorPalettes[currentPalette][Math.floor(Math.random() * colorPalettes[currentPalette].length)],
                    life: 1,
                    decay: Math.random() * 0.02 + 0.01,
                    type: 'normal'
                });
            }
        }
        
        // 创建反馈粒子
        function createFeedbackParticles(x, y, volume) {
            const particleCount = Math.floor(volume / 10);
            const color = colorPalettes[currentPalette][Math.floor(Math.random() * colorPalettes[currentPalette].length)];
            
            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                const size = Math.random() * 3 + 1;
                
                feedbackParticles.push({
                    x: x,
                    y: y,
                    size: size,
                    speedX: Math.cos(angle) * speed,
                    speedY: Math.sin(angle) * speed,
                    color: color,
                    life: 1,
                    decay: Math.random() * 0.03 + 0.02,
                    type: 'feedback'
                });
            }
        }
        
        // 绘制粒子
        function drawParticles() {
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            
            // 更新和绘制普通粒子
            particles.forEach((particle, index) => {
                // 更新粒子位置
                particle.x += particle.speedX;
                particle.y += particle.speedY;
                
                // 更新粒子生命值
                particle.life -= particle.decay;
                
                // 移除死亡的粒子
                if (particle.life <= 0) {
                    particles.splice(index, 1);
                    return;
                }
                
                // 绘制粒子
                particleCtx.beginPath();
                particleCtx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                particleCtx.fillStyle = `rgba(${particle.color}, ${particle.life * 0.5})`;
                particleCtx.fill();
                
                // 添加光晕效果
                const glowRadius = particle.size * 3;
                const gradient = particleCtx.createRadialGradient(
                    particle.x, particle.y, 0,
                    particle.x, particle.y, glowRadius
                );
                gradient.addColorStop(0, `rgba(${particle.color}, ${particle.life * 0.2})`);
                gradient.addColorStop(1, `rgba(${particle.color}, 0)`);
                
                particleCtx.beginPath();
                particleCtx.arc(particle.x, particle.y, glowRadius, 0, Math.PI * 2);
                particleCtx.fillStyle = gradient;
                particleCtx.fill();
            });
            
            // 如果粒子太少，补充一些
            if (particles.length < 30) {
                createParticles(10);
            }
        }
        
        // 绘制反馈粒子
        function drawFeedbackParticles() {
            feedbackCtx.clearRect(0, 0, feedbackCanvas.width, feedbackCanvas.height);
            
            // 更新和绘制反馈粒子
            feedbackParticles.forEach((particle, index) => {
                // 更新粒子位置
                particle.x += particle.speedX;
                particle.y += particle.speedY;
                
                // 更新粒子生命值
                particle.life -= particle.decay;
                
                // 移除死亡的粒子
                if (particle.life <= 0) {
                    feedbackParticles.splice(index, 1);
                    return;
                }
                
                // 绘制粒子
                feedbackCtx.beginPath();
                feedbackCtx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
                feedbackCtx.fillStyle = `rgba(${particle.color}, ${particle.life})`;
                feedbackCtx.fill();
                
                // 添加光晕效果
                const glowRadius = particle.size * 4;
                const gradient = feedbackCtx.createRadialGradient(
                    particle.x, particle.y, 0,
                    particle.x, particle.y, glowRadius
                );
                gradient.addColorStop(0, `rgba(${particle.color}, ${particle.life * 0.5})`);
                gradient.addColorStop(1, `rgba(${particle.color}, 0)`);
                
                feedbackCtx.beginPath();
                feedbackCtx.arc(particle.x, particle.y, glowRadius, 0, Math.PI * 2);
                feedbackCtx.fillStyle = gradient;
                feedbackCtx.fill();
            });
        }
        
        // 绘制星座
        function drawConstellations() {
            // 清除画布，但保留一些透明效果让星座淡出
            constellationCtx.fillStyle = 'rgba(0, 8, 20, 0.03)';
            constellationCtx.fillRect(0, 0, constellationCanvas.width, constellationCanvas.height);
            
            // 绘制所有星座
            constellations.forEach((constellation, index) => {
                // 更新星座点透明度（逐渐消失）
                constellation.points.forEach(point => {
                    point.alpha -= 0.001;
                    point.alpha = Math.max(0, point.alpha);
                });
                
                // 移除完全消失的星座
                if (constellation.points[0].alpha <= 0) {
                    constellations.splice(index, 1);
                    return;
                }
                
                // 绘制星座点
                constellation.points.forEach(point => {
                    // 绘制光晕
                    const glowRadius = point.size * 4;
                    const gradient = constellationCtx.createRadialGradient(
                        point.x, point.y, 0,
                        point.x, point.y, glowRadius
                    );
                    gradient.addColorStop(0, `rgba(${point.color}, ${point.alpha * 0.7})`);
                    gradient.addColorStop(1, `rgba(${point.color}, 0)`);
                    
                    constellationCtx.beginPath();
                    constellationCtx.arc(point.x, point.y, glowRadius, 0, Math.PI * 2);
                    constellationCtx.fillStyle = gradient;
                    constellationCtx.fill();
                    
                    // 绘制中心点
                    constellationCtx.beginPath();
                    constellationCtx.arc(point.x, point.y, point.size, 0, Math.PI * 2);
                    constellationCtx.fillStyle = `rgba(${point.color}, ${point.alpha})`;
                    constellationCtx.fill();
                });
                
                // 绘制星座连线
                constellationCtx.lineWidth = 1.5;
                constellation.lines.forEach(line => {
                    const pointA = constellation.points[line[0]];
                    const pointB = constellation.points[line[1]];
                    
                    if (pointA.alpha > 0 && pointB.alpha > 0) {
                        // 创建连线渐变
                        const lineGradient = constellationCtx.createLinearGradient(
                            pointA.x, pointA.y,
                            pointB.x, pointB.y
                        );
                        lineGradient.addColorStop(0, `rgba(${pointA.color}, ${pointA.alpha * 0.6})`);
                        lineGradient.addColorStop(1, `rgba(${pointB.color}, ${pointB.alpha * 0.6})`);
                        
                        constellationCtx.beginPath();
                        constellationCtx.moveTo(pointA.x, pointA.y);
                        constellationCtx.lineTo(pointB.x, pointB.y);
                        constellationCtx.strokeStyle = lineGradient;
                        constellationCtx.stroke();
                        
                        // 绘制连线上的流光效果
                        const time = Date.now() / 1000;
                        const flowPos = (time % 3) / 3;
                        
                        if (flowPos > 0 && flowPos < 0.9) {
                            const flowX = pointA.x + (pointB.x - pointA.x) * flowPos;
                            const flowY = pointA.y + (pointB.y - pointA.y) * flowPos;
                            
                            constellationCtx.beginPath();
                            constellationCtx.arc(flowX, flowY, 2, 0, Math.PI * 2);
                            constellationCtx.fillStyle = `rgba(255, 255, 255, ${pointA.alpha * 0.9})`;
                            constellationCtx.fill();
                        }
                    }
                });
            });
            
            // 绘制当前正在生成的星座（如果存在）
            if (currentConstellation.length > 0) {
                // 绘制当前星座点
                currentConstellation.forEach(point => {
                    const currentAlpha = Math.min(1, point.alpha + 0.3);
                    
                    // 绘制光晕
                    const glowRadius = point.size * 5;
                    const gradient = constellationCtx.createRadialGradient(
                        point.x, point.y, 0,
                        point.x, point.y, glowRadius
                    );
                    gradient.addColorStop(0, `rgba(${point.color}, ${currentAlpha * 0.8})`);
                    gradient.addColorStop(1, `rgba(${point.color}, 0)`);
                    
                    constellationCtx.beginPath();
                    constellationCtx.arc(point.x, point.y, glowRadius, 0, Math.PI * 2);
                    constellationCtx.fillStyle = gradient;
                    constellationCtx.fill();
                    
                    // 绘制中心点
                    constellationCtx.beginPath();
                    constellationCtx.arc(point.x, point.y, point.size, 0, Math.PI * 2);
                    constellationCtx.fillStyle = `rgba(${point.color}, ${currentAlpha})`;
                    constellationCtx.fill();
                });
                
                // 绘制当前星座连线
                if (currentConstellation.length > 1) {
                    constellationCtx.lineWidth = 2;
                    constellationCtx.beginPath();
                    constellationCtx.moveTo(currentConstellation[0].x, currentConstellation[0].y);
                    
                    for (let i = 1; i < currentConstellation.length; i++) {
                        constellationCtx.lineTo(currentConstellation[i].x, currentConstellation[i].y);
                    }
                    
                    constellationCtx.strokeStyle = `rgba(200, 200, 255, 0.8)`;
                    constellationCtx.stroke();
                }
            }
        }
        
        // 分析音频数据
        function analyzeAudio() {
            if (!isRecording || !analyser) return;
            
            // 获取音频数据
            analyser.getByteFrequencyData(audioDataArray);
            
            // 计算平均音量
            let sum = 0;
            for (let i = 0; i < audioDataArray.length; i++) {
                sum += audioDataArray[i];
            }
            const averageVolume = sum / audioDataArray.length;
            
            // 更新音量值
            soundLevel = averageVolume;
            
            // 计算主要频率
            let maxFreqIndex = 0;
            let maxFreqValue = 0;
            for (let i = 0; i < audioDataArray.length / 2; i++) {
                if (audioDataArray[i] > maxFreqValue) {
                    maxFreqValue = audioDataArray[i];
                    maxFreqIndex = i;
                }
            }
            const dominantFrequency = maxFreqIndex;
            
            // 检查是否超过音量阈值
            if (averageVolume > 20) {
                const now = Date.now();
                silenceTimer = 0;
                
                // 根据灵敏度控制生成频率
                const sensitivity = Math.max(3, Math.min(10, averageVolume / 15));
                if (now - lastSoundTime > 1000 / sensitivity) {
                    lastSoundTime = now;
                    
                    // 根据音量选择调色板
                    if (averageVolume > 120 && Math.random() > 0.7) {
                        currentPalette = (currentPalette + 1) % colorPalettes.length;
                    }
                    
                    // 生成星座点
                    const pointSize = Math.max(2, Math.min(10, averageVolume / 20));
                    
                    // 根据频率确定颜色
                    const colorIndex = Math.min(colorPalettes[currentPalette].length - 1, 
                        Math.floor(dominantFrequency / (256 / colorPalettes[currentPalette].length)));
                    const color = colorPalettes[currentPalette][colorIndex];
                    
                    // 根据频率确定位置
                    const xPos = (dominantFrequency / 256) * constellationCanvas.width;
                    const yVariation = Math.sin(now / 1000) * 100;
                    const yPos = (constellationCanvas.height / 2) + yVariation + (Math.random() - 0.5) * 200;
                    
                    // 创建新点
                    const newPoint = {
                        x: xPos,
                        y: yPos,
                        size: pointSize,
                        color: color,
                        alpha: 1.0,
                        createdAt: now
                    };
                    
                    // 添加到当前星座
                    currentConstellation.push(newPoint);
                    
                    // 创建粒子效果
                    createParticles(Math.floor(pointSize / 2), xPos, yPos, color);
                    
                    // 创建反馈粒子
                    createFeedbackParticles(xPos, yPos, averageVolume);
                    
                    // 如果当前星座有足够多的点，则完成这个星座
                    const maxPoints = Math.floor(averageVolume / 25) + 1;
                    if (currentConstellation.length >= maxPoints) {
                        completeConstellation();
                    }
                    
                    // 重置自动清除计时器
                    resetAutoClearTimer();
                }
            } else {
                // 增加静音计时器
                silenceTimer += 1;
                
                // 如果静音时间较长，完成当前星座
                if (silenceTimer > 30 && currentConstellation.length > 0) {
                    completeConstellation();
                }
            }
        }
        
        // 完成当前星座
        function completeConstellation() {
            if (currentConstellation.length === 0) return;
            
            // 随机选择星座模式
            const patternIndex = Math.floor(Math.random() * constellationPatterns.length);
            const pattern = constellationPatterns[patternIndex];
            const lines = pattern(currentConstellation);
            
            // 将当前星座添加到星座列表
            constellations.push({
                id: constellationId++,
                points: [...currentConstellation],
                lines: lines
            });
            
            // 创建庆祝粒子
            const centerX = currentConstellation.reduce((sum, p) => sum + p.x, 0) / currentConstellation.length;
            const centerY = currentConstellation.reduce((sum, p) => sum + p.y, 0) / currentConstellation.length;
            createParticles(30, centerX, centerY);
            
            // 重置当前星座
            currentConstellation = [];
        }
        
        // 重置自动清除计时器
        function resetAutoClearTimer() {
            clearTimeout(autoClearTimeout);
            // 如果90秒没有声音，自动清除所有星座
            autoClearTimeout = setTimeout(() => {
                if (soundLevel < 10) {
                    constellations = [];
                    constellationId = 0;
                    createParticles(50);
                }
            }, 90000);
        }
        
        // 动画循环
        function animate() {
            drawStarfield();
            drawConstellations();
            drawParticles();
            drawFeedbackParticles();
            analyzeAudio();
            animationId = requestAnimationFrame(animate);
        }
        
        // 初始化音频
        async function initAudio() {
            try {
                // 请求麦克风权限
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    } 
                });
                
                // 创建音频上下文
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                
                // 连接音频节点
                microphone.connect(analyser);
                analyser.fftSize = 512;
                analyser.smoothingTimeConstant = 0.7;
                
                // 创建数据数组
                const bufferLength = analyser.frequencyBinCount;
                audioDataArray = new Uint8Array(bufferLength);
                
                // 更新状态
                isRecording = true;
                
                // 创建初始粒子
                createParticles(50);
                
            } catch (error) {
                console.log('麦克风不可用，使用模拟声音模式');
                
                // 如果无法访问麦克风，使用模拟声音数据
                simulateAudio();
            }
        }
        
        // 模拟音频数据
        function simulateAudio() {
            isRecording = true;
            audioDataArray = new Uint8Array(256);
            
            // 创建周期性模拟声音
            let soundPhase = 0;
            
            setInterval(() => {
                // 生成有节奏的声音模式
                soundPhase += 0.1;
                const baseVolume = 30 + Math.sin(soundPhase) * 20;
                
                for (let i = 0; i < audioDataArray.length; i++) {
                    const frequencyPattern = Math.sin(i / 20 + soundPhase) * 0.5 + 0.5;
                    audioDataArray[i] = baseVolume * frequencyPattern + Math.random() * 10;
                }
                
                // 偶尔生成较大的声音事件
                if (Math.random() < 0.1) {
                    for (let i = 0; i < audioDataArray.length; i++) {
                        audioDataArray[i] = Math.min(255, audioDataArray[i] * 2);
                    }
                }
            }, 100);
            
            // 创建初始粒子
            createParticles(50);
        }
        
        // 处理窗口点击（开始音频上下文）
        function handleUserInteraction() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            // 创建视觉反馈
            createFeedbackParticles(
                Math.random() * feedbackCanvas.width,
                Math.random() * feedbackCanvas.height,
                100
            );
        }
        
        // 初始化
        function init() {
            initCanvasSize();
            createStarfield();
            
            // 添加用户交互监听
            window.addEventListener('click', handleUserInteraction);
            window.addEventListener('touchstart', handleUserInteraction);
            window.addEventListener('keydown', handleUserInteraction);
            
            // 窗口大小变化时调整Canvas尺寸
            window.addEventListener('resize', function() {
                initCanvasSize();
                createStarfield();
            });
            
            // 开始动画
            animate();
            
            // 尝试初始化音频
            initAudio();
        }
        
        // 启动应用
        init();
    </script>
</body>
</html>
