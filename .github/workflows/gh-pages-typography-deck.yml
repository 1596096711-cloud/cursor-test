# 将 typography-grid-detector/public 下的静态资源发布到 GitHub Pages。
# 完整 Next.js（含 API）无法在 Pages 上运行；站点内含幻灯片 +「完整网站说明」页 full-app.html。
name: Deploy typography deck to GitHub Pages

on:
  push:
    branches: ["main", "master"]
    paths:
      - "typography-grid-detector/public/**"
      - ".github/workflows/gh-pages-typography-deck.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-typography-deck
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Collect static files
        run: |
          mkdir -p _site
          SRC="typography-grid-detector/public"
          test -f "$SRC/Typography-Grid-Analyzer-Deck-Screenshots.html" || { echo "Missing deck HTML at $SRC"; exit 1; }
          cp -r "$SRC"/* _site/
          cp "$SRC/Typography-Grid-Analyzer-Deck-Screenshots.html" _site/index.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
