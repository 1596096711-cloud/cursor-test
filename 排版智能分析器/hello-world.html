<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeChat 2077</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --neon-cyan: #00fff2;
      --neon-magenta: #ff00ff;
      --neon-pink: #ff006e;
      --neon-blue: #00d4ff;
      --dark: #0a0a0f;
      --darker: #050508;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--darker);
      font-family: 'Share Tech Mono', monospace;
      color: var(--neon-cyan);
      overflow: hidden;
    }

    /* 3D Grid Background */
    .bg-3d {
      position: fixed;
      inset: 0;
      perspective: 600px;
      perspective-origin: 50% 30%;
      overflow: hidden;
      z-index: 0;
    }

    .grid-floor {
      position: absolute;
      bottom: -20%;
      left: 50%;
      transform: translateX(-50%) rotateX(75deg) scale(2);
      transform-origin: center bottom;
      width: 200%;
      height: 120%;
      background: 
        linear-gradient(90deg, rgba(0, 255, 242, 0.15) 1px, transparent 1px),
        linear-gradient(rgba(0, 255, 242, 0.15) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridPulse 4s ease-in-out infinite;
    }

    .grid-floor::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, var(--darker) 70%);
      pointer-events: none;
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Floating holographic lines */
    .hologram-lines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 255, 242, 0.03) 2px,
          rgba(0, 255, 242, 0.03) 4px
        );
    }

    /* Scanlines overlay */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.15) 2px,
        rgba(0, 0, 0, 0.15) 4px
      );
      opacity: 0.4;
    }

    /* Main content */
    .container {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 3rem;
    }

    .card {
      background: rgba(10, 10, 15, 0.85);
      border-radius: 4px;
      padding: 4rem 3rem;
      max-width: 440px;
      border: 2px solid var(--neon-cyan);
      box-shadow: 
        0 0 20px rgba(0, 255, 242, 0.3),
        0 0 40px rgba(0, 255, 242, 0.2),
        inset 0 0 60px rgba(0, 255, 242, 0.05);
      position: relative;
      clip-path: polygon(
        0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px)
      );
      animation: borderGlow 3s ease-in-out infinite;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      border: 1px solid var(--neon-magenta);
      border-radius: 4px;
      clip-path: polygon(
        0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px)
      );
      opacity: 0.5;
      pointer-events: none;
      animation: borderGlowAlt 3s ease-in-out infinite;
    }

    @keyframes borderGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 242, 0.3), 0 0 40px rgba(0, 255, 242, 0.2), inset 0 0 60px rgba(0, 255, 242, 0.05); }
      50% { box-shadow: 0 0 30px rgba(0, 255, 242, 0.5), 0 0 60px rgba(0, 255, 242, 0.3), inset 0 0 80px rgba(0, 255, 242, 0.08); }
    }

    @keyframes borderGlowAlt {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 255, 242, 0.5);
      margin-bottom: 0.75rem;
      animation: textGlow 2s ease-in-out infinite;
    }

    @keyframes textGlow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(0, 255, 242, 0.6)); }
      50% { filter: drop-shadow(0 0 16px rgba(255, 0, 255, 0.8)); }
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--neon-cyan);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.9;
      text-shadow: 0 0 10px rgba(0, 255, 242, 0.5);
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 2rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--neon-cyan);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--neon-cyan);
      animation: statusPulse 1.5s ease-in-out infinite;
    }

    .status-dot:nth-child(2) { animation-delay: 0.2s; background: var(--neon-magenta); box-shadow: 0 0 10px var(--neon-magenta); }
    .status-dot:nth-child(3) { animation-delay: 0.4s; background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }

    @keyframes statusPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.3); }
    }

    .corner-accent {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 8px var(--neon-cyan);
    }

    .corner-accent-tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
    .corner-accent-tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
    .corner-accent-bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
    .corner-accent-br { bottom: 12px; right: 12px; border-left: none; border-top: none; }
  </style>
</head>
<body>
  <div class="bg-3d">
    <div class="grid-floor"></div>
  </div>
  <div class="hologram-lines"></div>
  <div class="scanlines"></div>

  <div class="container">
    <div class="card">
      <span class="corner-accent corner-accent-tl"></span>
      <span class="corner-accent corner-accent-tr"></span>
      <span class="corner-accent corner-accent-bl"></span>
      <span class="corner-accent corner-accent-br"></span>

      <h1 class="logo">WeChat 2077</h1>
      <p class="subtitle">Connection Established</p>
      <div class="status-bar">
        <span class="status-dot"></span>
        <span class="status-dot"></span>
        <span class="status-dot"></span>
      </div>
    </div>
  </div>
</body>
</html>
